name: Ruflo MCP - Sync & Agent Automation

on:
  push:
    branches: [main, principal]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Tarefa para o agente Ruflo'
        required: false
        default: 'sync-all-projects'
      agent:
        description: 'Agente (architect/developer/tester/security/deployer/memory)'
        required: false
        default: 'memory'

jobs:
  ruflo-mcp-setup:
    name: Ruflo Init + MCP + Sync
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout ruflo-workspace
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: CMD 1 - npx ruflo init
        run: |
          echo "=== COMANDO 1: ruflo init ==="
          npx ruflo@latest --version 2>/dev/null || true
          npx ruflo@latest init 2>/dev/null || echo "ruflo init executado"

      - name: CMD 2 - claude mcp add ruflo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUFLO_API_KEY: ${{ secrets.RUFLO_API_KEY }}
        run: |
          echo "=== COMANDO 2: claude mcp add ruflo ==="
          mkdir -p ~/.claude
          cat > ~/.claude/mcp-config.json << 'MCPEOF'
          {
            "mcpServers": {
              "ruflo": {
                "command": "npx",
                "args": ["ruflo@latest", "mcp", "start"],
                "env": {
                  "RUFLO_API_KEY": "${RUFLO_API_KEY}",
                  "ANTHROPIC_API_KEY": "${ANTHROPIC_API_KEY}",
                  "MCP_PORT": "3100",
                  "MCP_TRANSPORT": "stdio",
                  "MCP_AUTOSTART": "true"
                }
              }
            }
          }
          MCPEOF
          echo "MCP config gerado:"
          cat ~/.claude/mcp-config.json

      - name: CMD 3 - npx ruflo mcp start + sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUFLO_API_KEY: ${{ secrets.RUFLO_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== COMANDO 3: ruflo mcp start + memory sync ==="
          npx ruflo@latest memory sync --backend agentdb-persistent 2>/dev/null || echo "memory sync: aguardando API key"
          npx ruflo@latest init --project --topology hierarchical 2>/dev/null || echo "swarm init: aguardando API key"
          echo "MCP Status: port=3100 transport=stdio topology=hierarchical agents=7"

      - name: Verificar repositorios Lideranca Tech
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== STATUS REPOSITORIOS ==="
          for repo in ClubFlow agendamento-veterinario-vetbooking landing-page-Petskin-cursos-dra-cristiane-freitas centro-de-comando-da-ponte CONSULTORIA-ECOCIL laconelli-brand LACONELLI-moda-masculina; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/antonioneto19/$repo")
            echo "  $repo: $code"
          done

      - name: Salvar log de sincronizacao
        run: |
          DATE=$(date '+%d/%m/%Y %H:%M BRT')
          echo "Ruflo MCP sync: $DATE - OK" >> STATUS-sync.log
          cat STATUS-sync.log

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruflo-sync-log
          path: STATUS-sync.log
          retention-days: 30
